name: Build and Push Docker Images (Default + Simple Mode)

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # New job to build dist and create release
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HUSKY: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build full distribution
        run: npm run build

      - name: Build simple distribution
        run: SIMPLE_MODE=true BUILD_OUTPUT_DIR=dist-simple npm run build

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package full distribution
        run: npm run package

      - name: Package simple distribution
        run: BUILD_OUTPUT_DIR=dist-simple npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-${{ steps.version.outputs.version }}.zip
            dist-simple-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
